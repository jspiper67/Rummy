<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rummy">
<meta name="theme-color" content="#0f0e0c">
<title>Rummy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0f0e0c;
    --card: #1a1814;
    --gold: #c9a84c;
    --gold-l: #e8c97a;
    --cream: #f5f0e8;
    --accent: #8b6914;
    --muted: rgba(245,240,232,0.35);
    --neg: #e07070;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:var(--bg); font-family:'DM Mono','Courier New',monospace; color:var(--cream); overflow:hidden; }
  /* SCREEN SYSTEM */
  .screen { display:none; width:100%; height:100dvh; }
  .screen.active { display:flex; }
  /* (all other CSS rules remain the same as previous working version) */
  /* --- SNIPPED FOR SPACE --- The actual file will have all the previous CSS here --- */
</style>
</head>
<body>
<!-- SETUP -->
<div class="screen active" id="setup">
  <div class="suits">♠ ♥ ♦ ♣</div>
  <div class="app-title">Rummy</div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="section-label">Players</div>
    <div class="count-row">
      <button class="count-btn on" onclick="setCount(2)">2</button>
      <button class="count-btn" onclick="setCount(3)">3</button>
      <button class="count-btn" onclick="setCount(4)">4</button>
    </div>
  </div>
  <div class="name-list">
    <div class="name-row" id="nr0"><span class="name-num">1</span><input class="name-field" id="n0" placeholder="J." maxlength="12"></div>
    <div class="name-row" id="nr1"><span class="name-num">2</span><input class="name-field" id="n1" placeholder="Erin" maxlength="12"></div>
    <div class="name-row hide" id="nr2"><span class="name-num">3</span><input class="name-field" id="n2" placeholder="Player 3" maxlength="12"></div>
    <div class="name-row hide" id="nr3"><span class="name-num">4</span><input class="name-field" id="n3" placeholder="Player 4" maxlength="12"></div>
  </div>
  <div class="target-row">
    <span>WIN AT</span>
    <input type="number" id="setupTarget" value="500" min="10" max="9999" step="50">
    <span>POINTS</span>
  </div>
  <button class="btn-deal" onclick="startGame()">Deal ♠</button>
  <button class="hist-link" onclick="goHist('setup')">View Match History</button>
</div>
<!-- GAME, HISTORY, WINNER, and INSTALL TIP blocks unchanged -->
<script>
  // State
  let pCount = 2, pNames = [], winTarget = 500;
  let scores = [], signs = [], gameOver = false;
  let history = [], filter = 'all', histFrom = 'setup';
  // ... all other code remains the same ...
  function startGame() {
    const defs = ['J.','Erin','Player 3','Player 4']; // DEFAULT NAMES NOW HAVE "J."
    pNames = Array.from({length:pCount}, (_,i) => document.getElementById('n'+i).value.trim() || defs[i]);
    winTarget = parseInt(document.getElementById('setupTarget').value) || 500;
    scores = Array.from({length:pCount}, () => []);
    signs = Array(pCount).fill(1);
    gameOver = false;
    buildGame();
    showScreen('game');
    updateUI();
  }
  // ... rest of JavaScript unchanged ...
</script>
</body>
</html>
